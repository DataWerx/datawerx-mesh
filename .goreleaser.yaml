# GoReleaser builds and publishes the unified `dwx` CLI — plus the deprecated
# `dwxctl` and `dwx-mcp` aliases kept for backward compatibility — as
# cross-platform, checksummed, SBOM'd, and cosign-signed archives, plus a
# Homebrew cask. `dwx` is the single entry point an operator should use (design
# 0016); `dwx mcp` replaces the standalone `dwx-mcp`, `dwx mesh` replaces
# `dwxctl`. The agent itself ships as the signed container image and Helm chart
# cut by .github/workflows/release.yml; this is the half an operator installs on
# a laptop.
#
# Validate locally with `goreleaser check`; the release runs in CI on a tag.
version: 2

project_name: datawerx

builds:
  - id: dwx
    main: ./cmd/dwx
    binary: dwx
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X github.com/DataWerx/datawerx-mesh/pkg/logging.Version={{ .Version }}

  # Deprecated alias: `dwx mesh`. Shipped so existing scripts and the Homebrew
  # cask keep working; prints a one-line deprecation note to stderr.
  - id: dwxctl
    main: ./cmd/dwxctl
    binary: dwxctl
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X github.com/DataWerx/datawerx-mesh/pkg/logging.Version={{ .Version }}

  # Deprecated alias: `dwx mcp`. Shipped so existing MCP client configs that
  # launch `dwx-mcp` keep working.
  - id: dwx-mcp
    main: ./cmd/dwx-mcp
    binary: dwx-mcp
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X github.com/DataWerx/datawerx-mesh/pkg/logging.Version={{ .Version }}

archives:
  - id: cli
    ids: [dwx, dwxctl, dwx-mcp]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files: [README.md, LICENSE, docs/install.md]

checksum:
  name_template: "checksums.txt"

# A software bill of materials per archive, for supply-chain auditing.
sboms:
  - artifacts: archive

# Keyless cosign signing of the checksum file (OIDC in CI); the whole archive set
# is verifiable from the one signed checksums.txt.
signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
    artifacts: checksum
    output: true

homebrew_casks:
  # Cask renamed dwxctl -> dwx with the unified CLI (design 0016). The stale
  # Casks/dwxctl.rb in the tap should be removed (or made a thin redirect) so
  # `brew install datawerx/tap/dwxctl` doesn't linger; new installs use
  # `brew install datawerx/tap/dwx`.
  - name: dwx
    ids: [cli]
    repository:
      owner: datawerx
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/DataWerx/datawerx-mesh"
    description: "DataWerx unified CLI (dwx), with the deprecated dwxctl and dwx-mcp aliases"
    license: "Apache-2.0"
    # Skip the tap commit on a snapshot/dirty build so `goreleaser --snapshot`
    # stays local-only.
    skip_upload: auto
    # The archive carries the unified CLI plus the back-compat aliases; install
    # them together so existing `dwxctl`/`dwx-mcp` invocations keep working.
    binaries: [dwx, dwxctl, dwx-mcp]

release:
  github:
    owner: datawerx
    name: datawerx-mesh
  # The image/chart release job also attaches assets to this tag's Release; do
  # not let goreleaser wipe them.
  mode: append
  footer: |
    ## Install

    See [docs/install.md](https://github.com/DataWerx/datawerx-mesh/blob/main/docs/install.md)
    for Homebrew, direct download, cosign verification, and the `dwx mcp` MCP
    server setup. The `dwxctl` and `dwx-mcp` binaries are deprecated aliases for
    `dwx mesh` and `dwx mcp`.

changelog:
  use: github
  sort: asc
  filters:
    exclude: ["^docs:", "^test:", "^chore:", "merge conflict", "Merge pull request"]
