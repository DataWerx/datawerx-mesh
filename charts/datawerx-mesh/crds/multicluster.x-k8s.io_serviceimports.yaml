---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: serviceimports.multicluster.x-k8s.io
spec:
  group: multicluster.x-k8s.io
  names:
    kind: ServiceImport
    listKind: ServiceImportList
    plural: serviceimports
    singular: serviceimport
    shortNames:
      - svcim
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: IP
          type: string
          jsonPath: .spec.ips[0]
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            ServiceImport is the cluster-local representation of a service
            exported by one or more other clusters. Managed by the import
            controller; not authored by users.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - ClusterSetIP
                    - Headless
                ips:
                  type: array
                  x-kubernetes-list-type: set
                  items:
                    type: string
                sessionAffinity:
                  type: string
                ports:
                  type: array
                  x-kubernetes-list-type: atomic
                  items:
                    type: object
                    required:
                      - port
                    properties:
                      name:
                        type: string
                      protocol:
                        type: string
                      appProtocol:
                        type: string
                      port:
                        type: integer
                        format: int32
            status:
              type: object
              properties:
                clusters:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - cluster
                  items:
                    type: object
                    required:
                      - cluster
                    properties:
                      cluster:
                        type: string
