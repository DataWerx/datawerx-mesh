name: dataplane

# Data-plane integration tests program the real kernel - WireGuard device +
# routes, iptables nat. They need root, the wireguard + iptable_nat modules,
# and CAP_SYS_ADMIN for per-test network namespaces. These are privileged, so
# they run on demand and nightly — never on the default unit path.
on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * *" # nightly 06:30 UTC

permissions:
  contents: read

jobs:
  dataplane:
    name: kernel data-plane integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Load required kernel modules
        run: sudo modprobe wireguard iptable_nat

      - name: Run data-plane integration tests (root)
        run: sudo -E env "PATH=$PATH" go test -tags dataplane -count=1 -v ./pkg/wg/... ./pkg/nat/... ./pkg/mtu/... ./pkg/edge/...
