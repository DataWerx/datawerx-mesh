name: release

# Cuts a release on a semver tag: a multi-arch, signed agent image with an SBOM,
# and a packaged Helm chart attached to the GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create releases / upload assets
  packages: write # push images to GHCR
  id-token: write # cosign keyless (OIDC)

env:
  # Normalized to a lowercase path in the image job below. GHCR/OCI references
  # must be lowercase, but github.repository preserves the org's case (DataWerx),
  # which cosign/helm reject ("could not parse reference").
  IMAGE: ghcr.io/${{ github.repository }}/mesh-agent

jobs:
  image:
    name: build, sign & SBOM the agent image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Normalize image ref to lowercase (GHCR requires it)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/mesh-agent" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push (multi-arch)
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Stamps the release tag into the binary so the agent's startup log
          # banner reports the exact version it was built from.
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM to the image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${IMAGE}@${DIGEST}"

      - name: Upload SBOM to the release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: sbom.spdx.json

  chart:
    name: package & publish the Helm chart
    runs-on: ubuntu-latest
    needs: image
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.15.4

      - name: Package chart
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm package charts/datawerx-mesh --version "${VERSION}" --app-version "${VERSION}"

      - name: Push chart to GHCR (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm push datawerx-mesh-*.tgz "oci://ghcr.io/${GITHUB_REPOSITORY,,}/charts"

      - name: Attach chart to the release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: datawerx-mesh-*.tgz

  cli:
    name: build, sign & publish the operator CLIs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # GoReleaser needs full history for the changelog

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Install Syft (SBOMs)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A PAT with `contents:write` on datawerx/homebrew-tap, so the
          # Homebrew formula can be pushed. Skipped automatically if unset.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
