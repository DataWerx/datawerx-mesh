name: helm

# Lint and render the chart on any change under charts/.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["charts/**"]
  pull_request:
    paths: ["charts/**"]

permissions:
  contents: read

jobs:
  lint:
    name: chart lint & template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.15.4

      - name: helm lint
        run: helm lint charts/datawerx-mesh

      - name: helm template (default)
        run: helm template dwx charts/datawerx-mesh --namespace datawerx-system >/dev/null

      - name: helm template (full options)
        run: |
          helm template dwx charts/datawerx-mesh --namespace datawerx-system \
            --set clusterID=cluster-a \
            --set wireguard.privateKey.existingSecret=dwx-wg \
            --set premium.saasEndpoint=https://mesh.example \
            --set premium.ssoTokenSecret.name=dwx-sso \
            --set metrics.service.enabled=true \
            --set metrics.serviceMonitor.enabled=true >/dev/null
