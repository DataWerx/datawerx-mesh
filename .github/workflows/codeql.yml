name: CodeQL

# Static analysis of the Go code for security issues, surfaced in the repo's
# code-scanning tab. Runs on push/PR to main and weekly to catch newly-added
# query coverage.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC

permissions:
  contents: read

jobs:
  # Code scanning (CodeQL's SARIF upload) requires a public repository or GitHub
  # Advanced Security. While the repo is private it isn't available, so gate the
  # analysis on visibility: it shows as skipped (not failed) until the repo is
  # public, then lights up automatically. The check runs on every trigger,
  # including schedule, which github.event.repository.visibility does not cover.
  guard:
    name: check visibility
    runs-on: ubuntu-latest
    outputs:
      public: ${{ steps.vis.outputs.public }}
    steps:
      - name: Resolve repository visibility
        id: vis
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          vis=$(gh api "repos/${{ github.repository }}" --jq .visibility 2>/dev/null || echo unknown)
          echo "Repository visibility: $vis"
          [ "$vis" = "public" ] && echo "public=true" >> "$GITHUB_OUTPUT" || echo "public=false" >> "$GITHUB_OUTPUT"

  analyze:
    name: analyze (go)
    needs: guard
    if: needs.guard.outputs.public == 'true'
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload results to code scanning
      actions: read
      contents: read
    env:
      GOPROXY: https://proxy.golang.org
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          check-latest: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: go
          queries: security-extended

      - name: Build
        run: go build ./...

      - name: Analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: "/language:go"
