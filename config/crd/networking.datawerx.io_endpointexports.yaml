---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: endpointexports.networking.datawerx.io
spec:
  group: networking.datawerx.io
  names:
    kind: EndpointExport
    listKind: EndpointExportList
    plural: endpointexports
    singular: endpointexport
    shortNames:
      - epx
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Cluster
          type: string
          jsonPath: .spec.clusterID
        - name: Service
          type: string
          jsonPath: .spec.serviceName
        - name: Type
          type: string
          jsonPath: .spec.type
      schema:
        openAPIV3Schema:
          type: object
          description: >-
            EndpointExport is one cluster's published contribution to a
            cross-cluster service (the broker-less wire format). Machine-managed;
            mirrored between clusters and consumed by the import controller.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - clusterID
                - serviceNamespace
                - serviceName
                - type
              properties:
                clusterID:
                  type: string
                serviceNamespace:
                  type: string
                serviceName:
                  type: string
                type:
                  type: string
                  enum:
                    - ClusterSetIP
                    - Headless
                exportedAtUnix:
                  type: integer
                  format: int64
                  description: Unix epoch seconds the owning ServiceExport was created; the MCS "oldest export wins" key (0 = unknown).
                ips:
                  type: array
                  x-kubernetes-list-type: set
                  items:
                    type: string
                ports:
                  type: array
                  x-kubernetes-list-type: atomic
                  items:
                    type: object
                    required:
                      - port
                    properties:
                      name:
                        type: string
                      protocol:
                        type: string
                      appProtocol:
                        type: string
                      port:
                        type: integer
                        format: int32
