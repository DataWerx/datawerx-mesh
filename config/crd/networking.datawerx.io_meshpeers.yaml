---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: meshpeers.networking.datawerx.io
spec:
  group: networking.datawerx.io
  names:
    kind: MeshPeer
    listKind: MeshPeerList
    plural: meshpeers
    singular: meshpeer
    shortNames:
      - mp
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Cluster
          type: string
          jsonPath: .spec.clusterID
        - name: Endpoint
          type: string
          jsonPath: .spec.endpoint
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: MeshPeer is the Schema for the meshpeers API.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - clusterID
                - publicKey
              properties:
                clusterID:
                  type: string
                  minLength: 1
                  description: Stable, globally unique identifier of the remote cluster.
                publicKey:
                  type: string
                  minLength: 1
                  description: Base64-encoded Curve25519 WireGuard public key of the remote peer.
                endpoint:
                  type: string
                  description: Reachable host:port of the remote relay/gateway. Empty means a roaming peer.
                podCIDRs:
                  type: array
                  x-kubernetes-list-type: set
                  items:
                    type: string
                  description: Pod network ranges served by the remote cluster.
                serviceCIDRs:
                  type: array
                  x-kubernetes-list-type: set
                  items:
                    type: string
                  description: Service (ClusterIP) ranges served by the remote cluster.
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Connected
                    - Error
                lastHandshakeTime:
                  type: integer
                  format: int64
                  description: Unix epoch seconds of the most recent successful handshake (0 if none).
                lastProbeAttempt:
                  type: integer
                  format: int64
                  description: Unix epoch seconds of the most recent active synthetic probe, any outcome (0 if never probed).
                lastProbeTime:
                  type: integer
                  format: int64
                  description: Unix epoch seconds of the most recent successful active probe (0 if none).
                message:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
